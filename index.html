<script>

const destinos = ["CTG","MIA","MAD","MEX","PTY","NYC"];
const estados = ["BOARDING","ON TIME","LAST CALL","DELAYED"];

function cambiarDatos(){

document.querySelectorAll(".fila").forEach(fila => {

let destino = fila.querySelector(".destino");
let estado = fila.querySelector(".estado");

destino.textContent = destinos[Math.floor(Math.random()*destinos.length)];
estado.textContent = estados[Math.floor(Math.random()*estados.length)];

});

}

setInterval(cambiarDatos, 2000);

</script>
